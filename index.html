<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento CFTV - IVI Energia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @media print { .no-print { display: none; } }
        .tab-active { border-bottom: 4px solid #10b981; color: #10b981; font-weight: 900; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div id="loginPage" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900">
        <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md">
            <h1 class="text-2xl font-black text-center mb-6">SISTEMA CFTV</h1>
            <input type="text" id="userInput" placeholder="Usuário" class="w-full mb-4 px-4 py-3 bg-slate-50 border rounded-xl">
            <input type="password" id="passInput" placeholder="Senha" class="w-full mb-6 px-4 py-3 bg-slate-50 border rounded-xl">
            <button onclick="autenticar()" class="w-full bg-emerald-600 text-white font-black py-4 rounded-xl uppercase">Entrar</button>
        </div>
    </div>

    <main id="mainApp" class="hidden min-h-screen">
        <header class="bg-white border-b sticky top-0 z-50 p-4">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="font-black text-xl">IVI ENERGIA</div>
                <div class="flex gap-4">
                    <button onclick="switchTab('ocorrencias')" id="tabBtnOcorrencias" class="tab-active py-2">OCORRÊNCIAS</button>
                    <button onclick="logout()" class="text-red-500"><i class="fas fa-power-off"></i></button>
                </div>
            </div>
        </header>

        <div class="max-w-7xl mx-auto p-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 no-print border border-slate-200">
                <form id="formRegistro" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="text" id="operador" placeholder="Operador" required class="p-3 border rounded-xl">
                    <select id="usina" required class="p-3 border rounded-xl"></select>
                    <input type="text" id="tipo" placeholder="Tipo" required class="p-3 border rounded-xl">
                    <input type="text" id="local" placeholder="Câmera/Local" required class="p-3 border rounded-xl">
                    <input type="text" id="desc" placeholder="Resumo Inicial" required class="md:col-span-3 p-3 border rounded-xl">
                    <button type="submit" class="bg-emerald-600 text-white font-black rounded-xl uppercase">Registrar</button>
                </form>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-[10px] uppercase font-black">
                        <tr>
                            <th class="p-4">Status</th>
                            <th class="p-4">Planta</th>
                            <th class="p-4">Evento / Solução</th>
                            <th class="p-4 text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaDados" class="text-[11px] divide-y"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="editModal" class="fixed inset-0 bg-slate-900/50 hidden z-[200] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-2xl p-8">
            <h3 class="text-xl font-black mb-6 uppercase">Regularização</h3>
            <div class="space-y-4">
                <input type="datetime-local" id="editDataReg" class="w-full p-3 border rounded-xl font-bold">
                <select id="editStatus" class="w-full p-3 border rounded-xl font-bold">
                    <option value="Aberto">Aberto</option>
                    <option value="Resolvido">✅ Resolvido</option>
                    <option value="Falso Alarme">⚠️ Falso Alarme</option>
                </select>
                <textarea id="editObs" placeholder="Resumo da Solução" rows="3" class="w-full p-3 border rounded-xl font-bold"></textarea>
                <input type="text" id="editImg" placeholder="Link da Imagem (URL)" oninput="atualizarPreview(this.value)" class="w-full p-3 border rounded-xl font-bold">
                <div id="previewContainer" class="hidden border rounded-xl overflow-hidden bg-slate-50">
                    <img id="imgPreview" src="" class="w-full h-32 object-cover">
                </div>
                <div class="flex gap-2">
                    <button onclick="closeModal()" class="flex-1 bg-slate-200 py-4 rounded-xl font-black uppercase">Sair</button>
                    <button id="saveEditBtn" class="flex-1 bg-emerald-600 text-white py-4 rounded-xl font-black uppercase">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "SUA_URL_DO_GOOGLE_SCRIPT_AQUI"; 
        let listaOcorrencias = [];
        let idAtual = null;

        function autenticar() {
            if(document.getElementById('userInput').value === "admin") {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                carregarDadosDaPlanilha();
            }
        }

        async function carregarDadosDaPlanilha() {
            const resp = await fetch(SCRIPT_URL);
            const dados = await resp.json();
            listaOcorrencias = dados.ocorrencias.slice(1);
            
            // Popula select de usinas
            const usinas = [...new Set(dados.ufvs.slice(1).map(u => u[0]))];
            document.getElementById('usina').innerHTML = '<option value="">Usina...</option>' + 
                usinas.map(u => `<option value="${u}">${u}</option>`).join('');
            
            renderizarTabela();
        }

        function renderizarTabela() {
            const tbody = document.getElementById('tabelaDados');
            tbody.innerHTML = [...listaOcorrencias].reverse().map((o, idx) => {
                const indexReal = listaOcorrencias.length - 1 - idx;
                const status = o[7] || "Aberto";
                return `
                    <tr class="hover:bg-slate-50">
                        <td class="p-4"><span class="p-1 rounded font-black ${status==='Aberto'?'bg-red-100 text-red-600':'bg-emerald-100 text-emerald-600'}">${status}</span></td>
                        <td class="p-4"><b>${o[2]}</b><br><span class="text-slate-400">${new Date(o[0]).toLocaleString()}</span></td>
                        <td class="p-4"><b>${o[3]}</b><br><i class="text-slate-500">${o[5] || '...'}</i>
                            ${o[9] ? `<br><a href="${o[9]}" target="_blank" class="text-blue-500 font-bold uppercase text-[9px]">Ver Imagem</a>` : ''}
                        </td>
                        <td class="p-4 text-center">
                            <button onclick="abrirEdicao(${indexReal})" class="text-blue-600 mr-2"><i class="fas fa-edit"></i></button>
                            <button onclick="deletarOcorrencia(${indexReal})" class="text-red-500"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function abrirEdicao(index) {
            idAtual = index;
            const o = listaOcorrencias[index];
            document.getElementById('editStatus').value = o[7] || "Aberto";
            document.getElementById('editObs').value = o[5] || "";
            document.getElementById('editImg').value = o[9] || "";
            document.getElementById('editDataReg').value = o[8] || new Date().toISOString().slice(0, 16);
            atualizarPreview(o[9] || "");
            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('editModal').classList.add('hidden'); }

        function atualizarPreview(url) {
            const img = document.getElementById('imgPreview');
            const cont = document.getElementById('previewContainer');
            if(url.startsWith('http')) { img.src = url; cont.classList.remove('hidden'); } else { cont.classList.add('hidden'); }
        }

        document.getElementById('saveEditBtn').onclick = async function() {
            this.innerText = "SALVANDO...";
            const payload = {
                action: "editOcorrencia",
                index: idAtual,
                status: document.getElementById('editStatus').value,
                solucao: document.getElementById('editObs').value,
                dataReg: document.getElementById('editDataReg').value,
                imagem: document.getElementById('editImg').value
            };
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Sucesso!");
            closeModal();
            setTimeout(carregarDadosDaPlanilha, 1000);
            this.innerText = "SALVAR";
        };

        async function deletarOcorrencia(index) {
            if(!confirm("Excluir registro?")) return;
            const payload = { action: "deleteOcorrencia", index: index };
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Excluído!");
            setTimeout(carregarDadosDaPlanilha, 1000);
        }

        document.getElementById('formRegistro').onsubmit = async function(e) {
            e.preventDefault();
            const payload = {
                action: "addOcorrencia",
                operador: document.getElementById('operador').value,
                usina: document.getElementById('usina').value,
                tipo: document.getElementById('tipo').value,
                local: document.getElementById('local').value,
                desc: document.getElementById('desc').value,
                impacto: "Baixo"
            };
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            this.reset();
            alert("Registrado!");
            setTimeout(carregarDadosDaPlanilha, 1000);
        };

        function logout() { location.reload(); }
    </script>
</body>
</html>
