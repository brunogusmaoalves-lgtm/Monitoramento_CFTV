<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento CFTV - IVI Energia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @media print { .no-print { display: none; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #d1fae5; border-radius: 10px; }
        .tab-active { border-bottom: 4px solid #10b981; color: #10b981; font-weight: 900; }
        .sticky-header th { position: sticky; top: 0; z-index: 10; background: #f8fafc; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div id="loginPage" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900">
        <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md border-t-8 border-emerald-500 text-center">
            <div class="mb-8">
                <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">Monitoramento <span class="text-emerald-500">CFTV</span></h1>
                <p class="text-slate-400 text-[10px] font-bold uppercase mt-1 tracking-widest italic">IVI Energia Management System</p>
            </div>
            <div class="space-y-4 text-left">
                <input type="text" id="userInput" placeholder="Usuário" class="w-full border-2 p-3 rounded-xl outline-none focus:border-emerald-500 transition text-sm">
                <input type="password" id="passInput" placeholder="Senha" class="w-full border-2 p-3 rounded-xl outline-none focus:border-emerald-500 transition text-sm">
                <button onclick="autenticar()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-4 rounded-xl font-bold shadow-lg transition-all active:scale-95 text-xs uppercase">Acessar Painel</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden min-h-screen flex flex-col">
        <header class="bg-white border-b px-8 py-4 flex justify-between items-center sticky top-0 z-50 no-print">
            <div class="flex items-center gap-10">
                <div class="border-l pl-3 border-slate-200">
                    <h2 class="text-sm font-black text-slate-800 uppercase">Monitoramento CFTV</h2>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Central de Operações</p>
                </div>
                <nav class="flex gap-8 items-center pt-2">
                    <button onclick="switchTab('ocorrencias')" id="tabBtnOcorrencias" class="text-xs font-black uppercase tracking-widest pb-4 tab-active transition-all">Ocorrências</button>
                    <button onclick="switchTab('status')" id="tabBtnStatus" class="text-xs font-black uppercase tracking-widest pb-4 text-slate-400 hover:text-emerald-500 transition-all">Status das UFVs</button>
                </nav>
            </div>
            <div class="flex items-center gap-6">
                <span id="displayUser" class="text-xs font-bold text-slate-600 border-r pr-6 uppercase"></span>
                <button onclick="logout()" class="text-xs font-black text-red-500 hover:text-red-700 uppercase cursor-pointer">Sair</button>
            </div>
        </header>

        <main id="contentOcorrencias" class="p-6 lg:p-8 max-w-[1600px] mx-auto w-full grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 no-print">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 sticky top-24">
                    <h3 class="text-xs font-black uppercase text-slate-400 mb-6 flex items-center gap-2">
                        <i class="fas fa-plus-circle text-emerald-500"></i> Novo Registro
                    </h3>
                    <form id="formRegistro" class="space-y-4">
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase">Data/Hora Início</label>
                            <input type="datetime-local" id="dataEventoManual" class="w-full mt-1 p-2 bg-slate-50 border rounded-lg text-xs outline-none focus:border-emerald-500" required>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase">Operador</label>
                                <select id="operador" class="w-full mt-1 p-2 bg-slate-50 border rounded-lg text-xs outline-none focus:border-emerald-500" required>
                                    <option value="" disabled selected>Selecione</option>
                                    <option>Everaldo</option><option>Layla</option><option>Geilson</option><option>Vanuzia</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase">Impacto</label>
                                <select id="impacto" class="w-full mt-1 p-2 bg-slate-50 border rounded-lg text-xs outline-none font-bold">
                                    <option>⚪ Nenhum</option><option>🟠 Parcial</option><option>🔴 Total</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase">Usina Solar</label>
                            <select id="usina" class="w-full mt-1 p-2 bg-slate-50 border rounded-lg text-xs outline-none focus:border-emerald-500" required></select>
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase">Classificação</label>
                            <select id="tipo" class="w-full mt-1 p-2 bg-slate-50 border rounded-lg text-xs outline-none focus:border-emerald-500">
                                <option>🚨 Invasão / Intrusão</option><option>🔨 Furto / Vandalismo</option><option>📡 Falha de Comunicação</option><option>🛠️ Manutenção Corretiva</option><option>👀 Atitude Suspeita</option><option>📉 Impacto na Geração</option>
                            </select>
                        </div>
                        <input type="text" id="local" placeholder="Local / ID Câmera" class="w-full p-2 bg-slate-50 border rounded-lg text-xs outline-none focus:border-emerald-500" required>
                        <textarea id="desc" rows="3" placeholder="Descrição detalhada..." class="w-full p-2 bg-slate-50 border rounded-lg text-xs outline-none focus:border-emerald-500" required></textarea>
                        <button type="submit" class="w-full bg-emerald-500 text-white py-3 rounded-xl font-bold hover:bg-emerald-600 transition shadow-lg text-xs uppercase tracking-widest">Sincronizar Evento</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-4">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-wrap gap-4 items-center no-print">
                    <div class="flex-1 relative min-w-[300px]">
                        <i class="fas fa-search absolute left-3 top-3 text-slate-400 text-xs"></i>
                        <input type="text" id="search" oninput="filtrarOcorrencias()" placeholder="Filtrar registros..." class="w-full pl-10 p-2 bg-slate-50 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-emerald-500">
                    </div>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b text-[10px] text-slate-400 font-black uppercase">
                            <tr>
                                <th class="px-6 py-4">Status / Geração</th>
                                <th class="px-6 py-4">Usina / Operador</th>
                                <th class="px-6 py-4">Ocorrência</th>
                                <th class="px-6 py-4 text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaDados" class="text-sm divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </main>

        <main id="contentStatus" class="hidden p-6 lg:p-8 max-w-[1600px] mx-auto w-full">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-6 border-b bg-slate-50/50 flex justify-between items-center no-print">
                    <h3 class="font-black text-slate-800 uppercase text-sm">Status de Infraestrutura (Nuvem)</h3>
                    <button onclick="gerarRelatorioExcel()" class="bg-emerald-100 text-emerald-700 px-4 py-2 rounded-lg text-[10px] font-black uppercase hover:bg-emerald-200 transition flex items-center gap-2">
                        <i class="fas fa-file-excel"></i> Exportar Excel (CSV)
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse sticky-header">
                        <thead class="bg-slate-100 text-[9px] font-black uppercase text-slate-500">
                            <tr>
                                <th class="px-4 py-3 border-b">UFV</th>
                                <th class="px-4 py-3 border-b text-center">Digifort</th>
                                <th class="px-4 py-3 border-b text-center">AnyDesk</th>
                                <th class="px-4 py-3 border-b text-center">Câm. ON/Total</th>
                                <th class="px-4 py-3 border-b">Fibra</th>
                                <th class="px-4 py-3 border-b">Segurança</th>
                                <th class="px-4 py-3 border-b">Pronta Resposta</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaUFVs" class="text-[11px] divide-y divide-slate-100 italic"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="editModal" class="hidden fixed inset-0 z-[110] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-2xl w-full max-w-lg shadow-2xl">
            <h3 class="font-black text-slate-800 uppercase text-sm mb-4">Atualizar Registro</h3>
            <div class="space-y-4">
                <select id="editStatus" class="w-full p-2 border rounded-lg bg-slate-50 text-xs font-bold">
                    <option value="Aberto">🔴 Aberto</option>
                    <option value="Investigando">🔵 Investigando</option>
                    <option value="Finalizado">🟢 Finalizado</option>
                </select>
                <textarea id="editObs" rows="3" class="w-full p-3 border rounded-lg bg-emerald-50 text-xs" placeholder="Relatório de encerramento..."></textarea>
                <div class="flex gap-3">
                    <button onclick="closeModal()" class="flex-1 font-bold text-slate-400 text-xs uppercase">Cancelar</button>
                    <button id="saveEditBtn" class="flex-1 bg-emerald-500 text-white py-3 rounded-xl font-bold text-xs uppercase">Salvar Alterações</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÕES FIREBASE FORNECIDAS 
        const firebaseConfig = {
            apiKey: "AIzaSyAtiizTXoMEUxRTfjrQeiD3xpgx1BvYgPc",
            authDomain: "sistema-cftv.firebaseapp.com",
            databaseURL: "https://sistema-cftv-default-rtdb.firebaseio.com",
            projectId: "sistema-cftv",
            storageBucket: "sistema-cftv.firebasestorage.app",
            messagingSenderId: "758248400848",
            appId: "1:758248400848:web:d872e1739dd4eafc86fbd5",
            measurementId: "G-KPXGJX7VBP"
        };

        // Inicializar Firebase Compat 
        firebase.initializeApp(firebaseConfig);
        const rtdb = firebase.database();

        const CREDENCIAIS = { u: "admin", p: "usina2026", n: "Gestor Operacional" }; [cite: 41]
        const NOMES_USINAS = [ [cite: 42]
            "Água Clara", "Almino Afonso", "Aloândia 1", "Aparecida do Taboado", "Araruama 1", 
            "Araruama 2", "Araruama 3", "Bonópolis", "Borda da Mata", "Botelhos 2", 
            "Brejinho", "Buriti Alegre", "Cachoeira Alta 1", "Cambuí", "Campo Grande", 
            "Corumbaíba 2", "Corumbaíba 3", "Frei Inocêncio", "Grossos 1", "Guará", 
            "Iaciara 1", "Iaciara 2", "Itaguaí 4", "Itaguara", "Itarumã 1", 
            "Itarumã 2", "Lambari", "Major Sales", "Mateus Leme 1", "Mateus Leme 2", 
            "Monte Sião", "Mossoró 2", "Nova Andradina", "Nova Aurora 2", "Nova Lacerda", 
            "Panamá de Goiás 1", "Panamá de Goiás 2", "Paranaiguara", "Paranatinga", "Paratinga", 
            "Paty de Alferes", "Pedra Santa", "Pongaí", "Resende", "Rio do Antônio 1", 
            "Rio do Antônio 2", "Rio Pardo de Minas", "Rota do Sol 1", "Santo Antônio do Descoberto", 
            "São Francisco de Itabapoana", "São Gabriel do Oeste 1", "São Joaquim da Barra 1", 
            "São Joaquim da Barra 2", "Serra do Mel", "Serra do Mel 2", "Vassouras", "Naque"
        ];

        let dadosOcorrenciasLocal = {}; [cite: 45]
        let dadosStatusLocal = {}; [cite: 45]

        function initApp() { [cite: 45]
            // Escutar Ocorrências [cite: 45]
            rtdb.ref("ocorrencias").on('value', (snap) => {
                dadosOcorrenciasLocal = snap.val() || {};
                renderizarOcorrencias(dadosOcorrenciasLocal);
            });

            // Escutar Status das UFVs [cite: 46]
            rtdb.ref("ufv_status").on('value', (snap) => {
                dadosStatusLocal = snap.val() || {};
                if (Object.keys(dadosStatusLocal).length === 0) popularStatusIniciais();
                else renderizarUFVs(dadosStatusLocal);
            });

            popularSelectUsinas(); [cite: 47]
            if(localStorage.getItem('session_cftv')) mostrarApp(); [cite: 47]
        }

        function popularSelectUsinas() { [cite: 47]
            const select = document.getElementById('usina');
            select.innerHTML = '<option value="" disabled selected>Selecione a Usina</option>' + 
                NOMES_USINAS.sort().map(n => `<option>${n}</option>`).join(''); [cite: 48]
        }

        function popularStatusIniciais() { [cite: 49]
            NOMES_USINAS.forEach(nome => {
                const id = nome.toLowerCase().replace(/\s/g, '_');
                rtdb.ref("ufv_status/" + id).set({ [cite: 49]
                    id: id, ufv: nome, digifort: "OK", anydesk: "OK",
                    totalCam: 8, onCam: 8, fibra: "OK", seguranca: "SEM NECESSIDADE", pronta_resposta: "INATIVO" [cite: 50]
                });
            });
        }

        // Salvar Nova Ocorrência [cite: 51]
        document.getElementById('formRegistro').onsubmit = function(e) {
            e.preventDefault(); [cite: 51]
            const novo = { [cite: 52]
                operador: document.getElementById('operador').value,
                impacto: document.getElementById('impacto').value,
                usina: document.getElementById('usina').value,
                tipo: document.getElementById('tipo').value,
                local: document.getElementById('local').value,
                desc: document.getElementById('desc').value, [cite: 53]
                status: "Aberto",
                data: document.getElementById('dataEventoManual').value,
                timestamp: Date.now() [cite: 53]
            };
            rtdb.ref("ocorrencias").push(novo).then(() => { [cite: 54]
                this.reset();
                alert("Evento salvo na nuvem!");
            });
        };

        function renderizarOcorrencias(dados) { [cite: 55]
            const container = document.getElementById('tabelaDados');
            const lista = Object.keys(dados).map(id => ({ id, ...dados[id] })).sort((a,b) => b.timestamp - a.timestamp); [cite: 56]
            
            container.innerHTML = lista.map(o => `
                <tr class="hover:bg-slate-50 border-b">
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 rounded text-[9px] font-black uppercase ${o.status === 'Aberto' ? 'bg-red-100 text-red-600' : 'bg-emerald-100 text-emerald-600'}">${o.status}</span>
                        <div class="mt-1 text-[8px] font-bold text-slate-400">${o.impacto}</div> [cite: 58]
                    </td>
                    <td class="px-6 py-4 text-[10px]">
                        <div class="text-emerald-600 font-bold uppercase">${o.usina}</div>
                        <div class="font-black text-slate-700 uppercase">${o.operador}</div> [cite: 59]
                    </td>
                    <td class="px-6 py-4">
                        <div class="font-bold text-slate-800">${o.tipo}</div>
                        <div class="text-[10px] text-slate-500">${o.desc}</div> [cite: 60]
                        ${o.obs ? `<div class="mt-2 text-[9px] bg-emerald-50 p-2 border-l-2 border-emerald-500"><b>SOLUÇÃO:</b> ${o.obs}</div>` : ''}
                    </td>
                    <td class="px-6 py-4 text-center">
                        <div class="flex gap-3 justify-center">
                            <button onclick="openModal('${o.id}')" class="text-slate-300 hover:text-emerald-600"><i class="fas fa-edit"></i></button>
                            <button onclick="excluirOcorrencia('${o.id}')" class="text-slate-200 hover:text-red-500"><i class="fas fa-trash"></i></button>
                        </div> [cite: 61]
                    </td>
                </tr>
            `).join(''); [cite: 62]
        }

        function renderizarUFVs(dados) { [cite: 63]
            const container = document.getElementById('tabelaUFVs');
            const lista = Object.values(dados).sort((a,b) => a.ufv.localeCompare(b.ufv)); [cite: 64]
            
            container.innerHTML = lista.map(u => `
                <tr>
                    <td class="px-4 py-3 font-bold text-slate-700 uppercase">${u.ufv}</td>
                    <td class="text-center">
                        <select onchange="updateUFV('${u.id}', 'digifort', this.value)" class="bg-transparent font-black ${u.digifort === 'OK' ? 'text-emerald-500' : 'text-red-500'}">
                            <option value="OK" ${u.digifort === 'OK' ? 'selected' : ''}>OK</option>
                            <option value="OFF" ${u.digifort !== 'OK' ? 'selected' : ''}>OFF</option> [cite: 65]
                        </select>
                    </td>
                    <td class="text-center">
                        <select onchange="updateUFV('${u.id}', 'anydesk', this.value)" class="bg-transparent font-black ${u.anydesk === 'OK' ? 'text-emerald-500' : 'text-red-500'}">
                            <option value="OK" ${u.anydesk === 'OK' ? 'selected' : ''}>OK</option>
                            <option value="OFF" ${u.anydesk !== 'OK' ? 'selected' : ''}>OFF</option> [cite: 67]
                        </select>
                    </td>
                    <td class="text-center font-bold">
                        <input type="number" onblur="updateUFV('${u.id}', 'onCam', this.value)" value="${u.onCam}" class="w-8 bg-transparent text-right"> / 
                        <input type="number" onblur="updateUFV('${u.id}', 'totalCam', this.value)" value="${u.totalCam}" class="w-8 bg-transparent"> [cite: 69]
                    </td>
                    <td><input type="text" onblur="updateUFV('${u.id}', 'fibra', this.value)" value="${u.fibra}" class="w-full bg-transparent outline-none px-1"></td> [cite: 69]
                    <td><input type="text" onblur="updateUFV('${u.id}', 'seguranca', this.value)" value="${u.seguranca}" class="w-full bg-transparent outline-none px-1"></td> [cite: 70]
                    <td><input type="text" onblur="updateUFV('${u.id}', 'pronta_resposta', this.value)" value="${u.pronta_resposta}" class="w-full bg-transparent outline-none px-1"></td> [cite: 70]
                </tr>
            `).join('');
        }

        function updateUFV(id, campo, valor) { [cite: 71]
            rtdb.ref(`ufv_status/${id}`).update({ [campo]: valor }); [cite: 71]
        }

        // Exportar Relatório [cite: 72]
        function gerarRelatorioExcel() {
            const dados = Object.values(dadosStatusLocal).sort((a,b) => a.ufv.localeCompare(b.ufv)); [cite: 72]
            let csv = "UFV;Fibra;Digifort;Anydesk;Câmeras ON;Câmeras Total;Segurança;Pronta Resposta\n"; [cite: 73]

            dados.forEach(u => {
                csv += `${u.ufv};${u.fibra};${u.digifort};${u.anydesk};${u.onCam};${u.totalCam};${u.seguranca};${u.pronta_resposta}\n`; [cite: 73]
            });

            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' }); [cite: 74]
            const url = URL.createObjectURL(blob); [cite: 74]
            const link = document.createElement("a"); [cite: 74]
            link.setAttribute("href", url); [cite: 75]
            link.setAttribute("download", `Relatorio_Status_UFVs_${new Date().toLocaleDateString().replace(/\//g, '-')}.csv`); [cite: 75]
            link.click();
        }

        function excluirOcorrencia(id) { [cite: 75]
            if(confirm("Remover permanentemente este registro?")) rtdb.ref(`ocorrencias/${id}`).remove(); [cite: 75]
        }

        let idEditando = null; [cite: 76]
        function openModal(id) { [cite: 77]
            idEditando = id;
            const item = dadosOcorrenciasLocal[id]; [cite: 78]
            document.getElementById('editStatus').value = item.status;
            document.getElementById('editObs').value = item.obs || "";
            document.getElementById('editModal').classList.remove('hidden'); [cite: 78]
        }

        document.getElementById('saveEditBtn').onclick = function() { [cite: 79]
            rtdb.ref(`ocorrencias/${idEditando}`).update({
                status: document.getElementById('editStatus').value,
                obs: document.getElementById('editObs').value
            }).then(closeModal); [cite: 79]
        };

        function closeModal() { document.getElementById('editModal').classList.add('hidden'); } [cite: 80]

        function autenticar() { [cite: 80]
            if(document.getElementById('userInput').value === CREDENCIAIS.u && document.getElementById('passInput').value === CREDENCIAIS.p) {
                localStorage.setItem('session_cftv', CREDENCIAIS.n); [cite: 80]
                mostrarApp(); [cite: 81]
            } else alert("Acesso negado.");
        }

        function mostrarApp() { [cite: 81]
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden'); [cite: 82]
            document.getElementById('displayUser').innerText = localStorage.getItem('session_cftv'); [cite: 82]
        }

        function logout() { localStorage.removeItem('session_cftv'); location.reload(); } [cite: 82, 83]

        function switchTab(tab) { [cite: 83]
            document.getElementById('contentOcorrencias').classList.toggle('hidden', tab !== 'ocorrencias');
            document.getElementById('contentStatus').classList.toggle('hidden', tab !== 'status'); [cite: 84]
            document.getElementById('tabBtnOcorrencias').classList.toggle('tab-active', tab === 'ocorrencias');
            document.getElementById('tabBtnStatus').classList.toggle('tab-active', tab === 'status'); [cite: 84]
        }

        function filtrarOcorrencias() { [cite: 85]
            const termo = document.getElementById('search').value.toLowerCase();
            const linhas = document.querySelectorAll('#tabelaDados tr'); [cite: 86]
            linhas.forEach(l => {
                l.style.display = l.innerText.toLowerCase().includes(termo) ? '' : 'none';
            });
        }

        window.onload = initApp; [cite: 87]
    </script>
</body>
</html>
